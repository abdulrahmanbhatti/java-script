<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select_menu</title>
    <link rel="stylesheet" href="select.css">
</head>
<body>

    <div class="hero">
        <div class="selector">
            <div class="selectField">
                <p>Select Social Media  </p>
                <img src="SelectMenu_Img/arrow.png" alt="">
            </div>
            <ul id="list">
               
                <li class="option">
                     <img src="SelectMenu_Img/facebook.png" alt="">
                    <p>Facebook</p>
                </li>
                  <li class="option">
                     <img src="SelectMenu_Img/youtube.png" alt="">
                    <p>Youtube</p>
                </li>
                  <li class="option">
                     <img src="SelectMenu_Img/instagram.png" alt="">
                    <p>instagram</p>
                </li>
                  <li class="option">
                     <img src="SelectMenu_Img/twitter.png" alt="">
                    <p>twitter</p>
                </li>
                  <li class="option">
                     <img src="SelectMenu_Img/pinterest.png" alt="">
                    <p>pinterest</p>
                </li>
                  <li class="option">
                     <img src="SelectMenu_Img/whatsapp.png" alt="">
                    <p>whatsapp</p>
                </li>
             
               
            </ul>
        </div>


    </div>
    
    <script src="select.js"></script>
</body>
</html>
