<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>game</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="navebar">
      <nav>
        <h3>Rock Paper Scissors</h3>
      </nav>
    </div>

    <div class="main-container">
      <div class="div">
        <section>
          <div class="img">
            <img class="images" id="Rock" src="cut/img3.jpg" alt="" />
            <img class="images" id="Paper" src="cut\img1.jpg" alt="" />
            <img class="images" id="Scissors" src="cut/img2.jpg" alt="" />
          </div>
        </section>

        <section class="content">
          <div class="you">
            <p class="you_player">0</p>
            <h3>You</h3>
          </div>
          <div class="Comp">
            <p class="comp_player">0</p>
            <h3>Comp</h3>
          </div>
        </section>

        <div class="result-container">
          <div class="result">
            <p id="para">Start Your Game</p>
          </div>
          <div class="selectField">
            <p id="selectText">Set Winning Point</p>
            <img src="SelectMenu_Img/arrow.png" alt="" />
          </div>
        </div>
        <div id="lister" class="hide">
          <ul id="list">
            <li class="option">
              <p>5</p>
            </li>
            <li class="option">
              <p>10</p>
            </li>
            <li class="option">
              <p>15</p>
            </li>
            <li class="option">
              <p>20</p>
            </li>
            <li class="option">
              <p>25</p>
            </li>
            <li class="option">
              <p>30</p>
            </li>
          </ul>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
